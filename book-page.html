<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quyển sách</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Georgia', 'Times New Roman', serif;
      background:
        radial-gradient(ellipse at top, #6b4423 0%, #3e2410 70%, #2a1808 100%);
      color: #f4e3c1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px 24px;
      box-sizing: border-box;
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 48px);
      color: #f4d990;
      text-shadow: 0 2px 0 #2a1808, 0 0 18px rgba(255, 200, 100, 0.35);
    }
    .page {
      max-width: 600px;
      background: #f4e3c1;
      color: #2a1808;
      padding: 40px 48px;
      border-radius: 4px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      line-height: 1.7;
      font-size: 16px;
    }
    a.back {
      color: #f4d990;
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid #8b5a2b;
      border-radius: 6px;
      background: rgba(0,0,0,0.25);
    }
    a.back:hover { background: #8b5a2b; color: #fff8e7; }
  </style>
</head>
<body>
  <h1 id="bookTitle">Quyển sách</h1>
  <div class="page">
    <p>Trang này dành cho nội dung của quyển sách. Bố có thể viết kỷ niệm, câu chuyện, hoặc những lời nhắn ở đây.</p>
    <p id="meta" style="opacity:0.6; font-size:13px; margin-top:24px;"></p>
  </div>
  <a class="back" href="shelf-1.html">&larr; Quay lại kệ sách</a>

  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    if (id) {
      document.getElementById('meta').textContent = 'Sách số ' + id;
    }
  </script>
</body>
</html>
