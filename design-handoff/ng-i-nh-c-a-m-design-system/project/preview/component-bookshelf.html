<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Component · Bookshelf</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--paper-cream); }
  .shelf { background: var(--wood-teak-dark); padding: 18px 16px 8px; border-radius: 4px 4px 0 0; box-shadow: var(--shadow-object); }
  .books { display: flex; gap: 6px; align-items: flex-end; }
  .book { width: 38px; height: 130px; padding: 8px 4px; display: flex; align-items: center; justify-content: center; writing-mode: vertical-rl; transform: rotate(180deg); font-family: var(--font-serif); font-size: 11px; color: var(--paper-cream); border-radius: 1px; box-shadow: inset -3px 0 6px rgba(0,0,0,0.3); }
  .plank { height: 8px; background: var(--wood-teak); border-radius: 0 0 3px 3px; box-shadow: 0 2px 4px rgba(58,40,24,0.3); }
  .bookmark { position: relative; }
  .bookmark::after { content:''; position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 8px; height: 18px; background: var(--lacquer-red); }
</style>
</head>
<body>
<div class="shelf">
  <div class="books">
    <div class="book" style="background:#9c2a2a;height:128px">Con Trai</div>
    <div class="book" style="background:#5a7a52;height:134px">Con Gái</div>
    <div class="book bookmark" style="background:#3a4f6e;height:124px">Cháu An</div>
    <div class="book" style="background:#a14d2e;height:130px">Cháu Minh</div>
    <div class="book" style="background:#5e3a1a;height:120px">Gia Đình</div>
    <div class="book" style="background:#e8b34a;height:128px;color:#3a2818">Bố</div>
  </div>
</div>
<div class="plank"></div>
</body>
</html>
