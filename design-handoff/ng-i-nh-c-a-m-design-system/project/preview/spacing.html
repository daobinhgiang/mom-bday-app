<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--paper-cream); color: var(--ink); font-family: var(--font-serif); }
  .head { font-family: var(--font-hand); font-size: 22px; margin: 0 0 14px; }
  .scale { display: flex; flex-direction: column; gap: 6px; }
  .step { display: flex; align-items: center; gap: 12px; }
  .step .lbl { width: 80px; font-size: 12px; color: var(--ink-soft); font-family: var(--font-serif); font-style: italic; }
  .step .bar { height: 14px; background: var(--wall-ochre); border-radius: 2px; }
  .step .px { font-size: 11px; color: var(--ink-faded); }
</style>
</head>
<body>
<h3 class="head">Spacing — 4px base, used loosely</h3>
<div class="scale">
  <div class="step"><div class="lbl">space-1</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
  <div class="step"><div class="lbl">space-2</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
  <div class="step"><div class="lbl">space-3</div><div class="bar" style="width:12px"></div><div class="px">12px</div></div>
  <div class="step"><div class="lbl">space-4</div><div class="bar" style="width:16px"></div><div class="px">16px</div></div>
  <div class="step"><div class="lbl">space-5</div><div class="bar" style="width:24px"></div><div class="px">24px</div></div>
  <div class="step"><div class="lbl">space-6</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
  <div class="step"><div class="lbl">space-7</div><div class="bar" style="width:48px"></div><div class="px">48px</div></div>
  <div class="step"><div class="lbl">space-8</div><div class="bar" style="width:64px"></div><div class="px">64px</div></div>
  <div class="step"><div class="lbl">space-9</div><div class="bar" style="width:96px"></div><div class="px">96px</div></div>
  <div class="step"><div class="lbl">space-10</div><div class="bar" style="width:144px"></div><div class="px">144px</div></div>
</div>
</body>
</html>
