<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Type · Handwritten</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--paper-cream); color: var(--ink); }
  .row { display:flex; gap:18px; align-items:baseline; margin-bottom:8px; }
  .lbl { width:120px; font-family: var(--font-serif); font-size:11px; color: var(--ink-faded); font-style: italic; }
  .h-xl { font-family: var(--font-hand); font-size: 44px; line-height: 1.1; color: var(--ink); }
  .h-lg { font-family: var(--font-hand); font-size: 30px; line-height: 1.25; color: var(--ink); }
  .h-base { font-family: var(--font-hand); font-size: 22px; line-height: 1.4; color: var(--ink); }
  .flag { margin-top:14px; padding: 8px 12px; background: rgba(232,179,74,0.18); border-left: 3px solid var(--lantern-yellow); font-family: var(--font-serif); font-size: 12px; color: var(--ink-soft); font-style: italic; }
</style>
</head>
<body>
  <div class="row"><div class="lbl">hand-xl · 44</div><div class="h-xl">Mẹ ơi, về nhà thôi.</div></div>
  <div class="row"><div class="lbl">hand-lg · 30</div><div class="h-lg">Cuốn sách của Con Gái</div></div>
  <div class="row"><div class="lbl">hand-base · 22</div><div class="h-base">"Bà ngoại nấu ăn ngon nhất thế giới!" — bé An</div></div>
  <p class="flag">⚠ Caveat (Google Fonts) substitutes for a custom Vietnamese handwriting font. Replace when the commissioned font is ready — diacritics deserve better.</p>
</body>
</html>
