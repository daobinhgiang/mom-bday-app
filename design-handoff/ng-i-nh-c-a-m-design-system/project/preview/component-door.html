<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Component · Door Knock</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: linear-gradient(180deg,#5e3a1a 0%,#3a2818 100%); display:flex; flex-direction:column; gap:14px; align-items: center; justify-content:center; min-height: 380px; }
  .door { width: 130px; height: 200px; background: linear-gradient(135deg,#5e3a1a,#3a2818); border: 4px solid #2a1810; border-radius: 4px 4px 0 0; position: relative; box-shadow: var(--shadow-room); cursor: pointer; }
  .door::before { content:''; position: absolute; top: 50%; right: 14px; width: 14px; height: 14px; border-radius: 50%; background: var(--lantern-yellow); box-shadow: 0 0 12px var(--lantern-glow); transform: translateY(-50%); }
  .door .panel { position: absolute; left: 12px; right: 12px; height: 30%; border: 1px solid rgba(244,234,215,0.08); }
  .door .p1 { top: 14px; }
  .door .p2 { bottom: 14px; }
  .label { font-family: var(--font-hand); font-size: 24px; color: var(--lantern-glow); }
  .sub { font-family: var(--font-serif); font-style: italic; font-size: 13px; color: rgba(244,234,215,0.55); }
</style>
</head>
<body>
<div class="door"><div class="panel p1"></div><div class="panel p2"></div></div>
<div class="label">gõ cửa vào nhà</div>
<div class="sub">— login, framed as knocking</div>
</body>
</html>
