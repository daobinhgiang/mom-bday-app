<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Time-of-day Light</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--paper-cream); }
  .head { font-family: var(--font-hand); font-size: 24px; color: var(--ink); margin: 0 0 4px; }
  .sub { font-family: var(--font-serif); font-style: italic; font-size: 12px; color: var(--ink-soft); margin: 0 0 14px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .tod { aspect-ratio: 1.2/1; border-radius: var(--radius-soft); position: relative; overflow: hidden; box-shadow: var(--shadow-paper); border: 1px solid rgba(58,40,24,0.16); }
  .tod .scene { position: absolute; inset: 0; background: var(--wall-ochre); }
  .tod .filter { position: absolute; inset: 0; mix-blend-mode: multiply; }
  .tod .lbl { position: absolute; left: 10px; bottom: 8px; font-family: var(--font-serif); font-size: 12px; color: #f4ead7; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
  .tod .hex { position: absolute; right: 10px; bottom: 8px; font-family: var(--font-serif); font-size: 10px; font-style: italic; color: rgba(244,234,215,0.85); }
</style>
</head>
<body>
<h2 class="head">Time-of-day light — global filter</h2>
<p class="sub">Applied as a multiply layer over the whole canvas. Shifts across the day.</p>
<div class="row">
  <div class="tod"><div class="scene"></div><div class="filter" style="background:#f5c97a;opacity:0.55"></div><div class="lbl">sunrise</div><div class="hex">#f5c97a</div></div>
  <div class="tod"><div class="scene"></div><div class="filter" style="background:#fbf2dc;opacity:0.4"></div><div class="lbl">noon</div><div class="hex">#fbf2dc</div></div>
  <div class="tod"><div class="scene"></div><div class="filter" style="background:#e89c5a;opacity:0.6"></div><div class="lbl">sunset</div><div class="hex">#e89c5a</div></div>
  <div class="tod"><div class="scene"></div><div class="filter" style="background:#2b3a52;opacity:0.7"></div><div class="lbl">night</div><div class="hex">#2b3a52</div></div>
  <div class="tod"><div class="scene"></div><div class="filter" style="background:#8aa3b5;opacity:0.5"></div><div class="lbl">rain</div><div class="hex">#8aa3b5</div></div>
</div>
</body>
</html>
