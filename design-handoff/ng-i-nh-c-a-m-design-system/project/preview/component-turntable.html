<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Component · Turntable</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--wall-ochre); display:flex; align-items:center; justify-content:center; min-height: 320px; }
  .player { background: var(--wood-teak-dark); padding: 24px; border-radius: 4px; box-shadow: var(--shadow-room); position: relative; width: 320px; }
  .platter { width: 220px; height: 220px; margin: 0 auto; border-radius: 50%; background: radial-gradient(circle, #1a0e08 18%, #2a1810 22%, #1a0e08 32%, #2a1810 36%, #1a0e08 50%, #2a1810 54%, #1a0e08 70%); position: relative; box-shadow: inset 0 0 30px rgba(0,0,0,0.6); animation: spin 3.4s linear infinite; }
  .platter::before { content:''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 60px; height: 60px; border-radius: 50%; background: var(--lacquer-red); border: 1px solid #6e1818; }
  .platter::after { content:''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 8px; height: 8px; border-radius: 50%; background: var(--lantern-yellow); }
  .arm { position: absolute; top: 30px; right: 30px; width: 100px; height: 4px; background: var(--paper-cream); transform-origin: right center; transform: rotate(-22deg); border-radius: 2px; }
  .arm::before { content:''; position: absolute; left: -8px; top: -6px; width: 16px; height: 16px; background: var(--lantern-yellow); border-radius: 50%; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="player">
  <div class="platter"></div>
  <div class="arm"></div>
</div>
</body>
</html>
