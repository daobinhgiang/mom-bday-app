<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Type · Display & Body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--paper-cream); color: var(--ink); }
  .row { display:flex; gap:18px; align-items:baseline; margin-bottom:10px; }
  .lbl { width:120px; font-family: var(--font-serif); font-size:11px; color: var(--ink-faded); font-style: italic; }
  .specimen { font-family: var(--font-serif); }
  .h1 { font-size: 48px; line-height: 1.1; }
  .h2 { font-size: 36px; line-height: 1.2; }
  .h3 { font-size: 28px; line-height: 1.3; }
  .body { font-size: 17px; line-height: 1.55; }
  .small { font-size: 13px; color: var(--ink-soft); font-style: italic; }
</style>
</head>
<body>
  <div class="row"><div class="lbl">display · 48</div><div class="specimen h1">Ngôi Nhà Của Mẹ</div></div>
  <div class="row"><div class="lbl">h2 · 36</div><div class="specimen h2">Phòng Nhạc của Mẹ</div></div>
  <div class="row"><div class="lbl">h3 · 28</div><div class="specimen h3">Cuốn sách của Con Trai</div></div>
  <div class="row"><div class="lbl">body · 17</div><div class="specimen body">Mỗi cuốn sách là một bộ sưu tập kỷ niệm từ một người trong gia đình.</div></div>
  <div class="row"><div class="lbl">caption · 13</div><div class="specimen small">Tháng Tư · 2025 — kỷ niệm sinh nhật Mẹ</div></div>
</body>
</html>
